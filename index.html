<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ponlonline | Webs profesionales para emprendedores</title>
  <meta name="description" content="Ponlonline crea páginas web profesionales para emprendedores. Tu negocio abierto 24/7, visible en Google y WhatsApp." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #03050b;
      --panel: rgba(14, 19, 38, 0.62);
      --panel-strong: rgba(10, 14, 28, 0.8);
      --stroke: rgba(255, 255, 255, 0.14);
      --text: #edf2ff;
      --muted: #a8b2cc;
      --violet: #8f69ff;
      --cyan: #50d3ff;
      --pink: #ff5bd6;
      --green: #21d07a;
      --green-deep: #16a75f;
      --orange: #ffb11a;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 24px 55px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: clamp(15px, calc(0.625rem + 0.45vw), 18px);
    }

    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      text-rendering: optimizeLegibility;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
      position: relative;
    }

    .top-wrap,
    main,
    footer {
      transition: opacity 0.55s ease, transform 0.55s ease, filter 0.55s ease;
    }

    body.is-loading .top-wrap,
    body.is-loading main,
    body.is-loading footer {
      opacity: 0;
      transform: translateY(10px);
      filter: blur(6px);
      pointer-events: none;
    }

    .entry-loader {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: grid;
      place-content: center;
      gap: 12px;
      background: radial-gradient(circle at 50% 45%, rgba(27, 39, 72, 0.75), rgba(3, 5, 11, 0.95));
      transition: opacity 0.45s ease;
    }

    .entry-loader.hide {
      opacity: 0;
      pointer-events: none;
    }

    .entry-loader-orb {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: rgba(80, 211, 255, 0.95);
      border-right-color: rgba(143, 105, 255, 0.95);
      animation: loaderSpin 0.9s linear infinite;
      justify-self: center;
    }

    .entry-loader-text {
      font-family: "Outfit", sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: #d8e5ff;
      text-align: center;
    }

    .scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
      isolation: isolate;
      transform: translateZ(0);
      background: radial-gradient(circle at 24% 18%, rgba(143, 105, 255, 0.28), rgba(143, 105, 255, 0) 42%),
                  radial-gradient(circle at 80% 72%, rgba(80, 211, 255, 0.26), rgba(80, 211, 255, 0) 46%),
                  linear-gradient(180deg, #040811 0%, #02040a 100%);
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .scene::before {
      width: 128vmax;
      height: 128vmax;
      top: -64vmax;
      left: -34vmax;
      opacity: 0.32;
      background: conic-gradient(from 120deg, rgba(80, 211, 255, 0), rgba(80, 211, 255, 0.4), rgba(143, 105, 255, 0.42), rgba(80, 211, 255, 0));
      filter: blur(26px);
      animation: liquidOrbit 28s linear infinite;
    }

    .scene::after {
      width: 92vmax;
      height: 92vmax;
      right: -44vmax;
      bottom: -40vmax;
      opacity: 0.28;
      background: conic-gradient(from 220deg, rgba(80, 211, 255, 0), rgba(80, 211, 255, 0.34), rgba(143, 105, 255, 0.34), rgba(80, 211, 255, 0));
      filter: blur(20px);
      animation: liquidOrbitReverse 34s linear infinite;
    }

    .liquid-ribbon {
      position: absolute;
      width: 132vmax;
      height: 26vmax;
      border-radius: 999px;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.9;
      mix-blend-mode: screen;
      box-shadow: 0 26px 80px rgba(5, 10, 28, 0.72);
      transform-origin: center;
      filter: saturate(1.2) contrast(1.08);
    }

    .liquid-ribbon::before,
    .liquid-ribbon::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }

    .liquid-ribbon::before {
      background: linear-gradient(
        108deg,
        rgba(210, 230, 255, 0.92) 0%,
        rgba(134, 163, 255, 0.74) 7%,
        rgba(60, 36, 176, 0.95) 24%,
        rgba(10, 10, 45, 0.98) 49%,
        rgba(90, 67, 206, 0.88) 70%,
        rgba(181, 168, 255, 0.82) 86%,
        rgba(245, 247, 255, 0.94) 100%
      );
    }

    .liquid-ribbon::after {
      inset: 9% 4%;
      background: linear-gradient(
        118deg,
        rgba(255, 255, 255, 0.6) 0%,
        rgba(142, 210, 255, 0.42) 10%,
        rgba(33, 18, 128, 0.65) 31%,
        rgba(11, 8, 52, 0.88) 57%,
        rgba(144, 126, 255, 0.52) 83%,
        rgba(255, 255, 255, 0.56) 100%
      );
      filter: blur(1px);
      opacity: 0.82;
    }

    .liquid-ribbon.r1 {
      top: 6%;
      left: -48vmax;
      transform: rotate(-28deg) scale(1.03);
      animation: liquidRibbonOne 22s ease-in-out infinite alternate;
    }

    .liquid-ribbon.r2 {
      top: 50%;
      left: 6%;
      width: 118vmax;
      transform: rotate(34deg) scale(1.02);
      animation: liquidRibbonTwo 26s ease-in-out infinite alternate;
      opacity: 0.84;
    }

    .liquid-ribbon.r3 {
      bottom: -9%;
      right: -52vmax;
      transform: rotate(-22deg);
      animation: liquidRibbonThree 24s ease-in-out infinite alternate;
      opacity: 0.8;
    }

    .aurora {
      position: absolute;
      width: 120vmax;
      height: 34vmax;
      border-radius: 999px;
      filter: blur(8px);
      mix-blend-mode: screen;
      opacity: 0.38;
      transform-origin: center;
    }

    .fluid {
      position: absolute;
      width: 66vmax;
      height: 52vmax;
      border-radius: 60% 40% 55% 45% / 48% 38% 62% 52%;
      filter: blur(12px);
      mix-blend-mode: screen;
      opacity: 0.26;
      animation: fluidMorph 18s ease-in-out infinite, fluidDrift 24s ease-in-out infinite alternate;
      will-change: transform, border-radius;
    }

    .fluid.f1 {
      left: -22vmax;
      top: -18vmax;
      background: conic-gradient(from 210deg, rgba(80, 211, 255, 0.24), rgba(143, 105, 255, 0.52), rgba(255, 91, 214, 0.26), rgba(80, 211, 255, 0.18));
      animation-delay: -4s;
    }

    .fluid.f2 {
      right: -24vmax;
      top: 20vmax;
      background: conic-gradient(from 180deg, rgba(143, 105, 255, 0.26), rgba(80, 211, 255, 0.48), rgba(143, 105, 255, 0.2));
      animation-delay: -8s;
    }

    .fluid.f3 {
      left: 10vmax;
      bottom: -22vmax;
      background: conic-gradient(from 320deg, rgba(80, 211, 255, 0.18), rgba(143, 105, 255, 0.4), rgba(80, 211, 255, 0.2));
      animation-delay: -12s;
    }

    .aurora.a1 {
      top: -8%;
      left: -26%;
      background: linear-gradient(110deg, rgba(80, 211, 255, 0.16), rgba(143, 105, 255, 0.7), rgba(255, 91, 214, 0.14));
      animation: ribbonOne 16s ease-in-out infinite alternate;
    }

    .aurora.a2 {
      top: 28%;
      right: -44%;
      background: linear-gradient(120deg, rgba(80, 211, 255, 0.15), rgba(143, 105, 255, 0.62), rgba(80, 211, 255, 0.17));
      animation: ribbonTwo 18s ease-in-out infinite alternate;
    }

    .aurora.a3 {
      bottom: -18%;
      left: -8%;
      background: linear-gradient(110deg, rgba(143, 105, 255, 0.26), rgba(80, 211, 255, 0.52), rgba(143, 105, 255, 0.18));
      animation: ribbonThree 20s ease-in-out infinite alternate;
    }

    .glow {
      position: absolute;
      width: 40vmax;
      height: 40vmax;
      border-radius: 50%;
      filter: blur(34px);
      opacity: 0.32;
    }

    .glow.g1 {
      top: -22vmax;
      left: -8vmax;
      background: radial-gradient(circle, rgba(143, 105, 255, 0.9), rgba(143, 105, 255, 0));
      animation: pulseOne 14s ease-in-out infinite;
    }

    .glow.g2 {
      right: -10vmax;
      bottom: -16vmax;
      background: radial-gradient(circle, rgba(80, 211, 255, 0.84), rgba(80, 211, 255, 0));
      animation: pulseTwo 17s ease-in-out infinite;
    }

    @keyframes ribbonOne {
      0% { transform: rotate(-20deg) translate3d(0, 0, 0) scale(1); }
      100% { transform: rotate(-14deg) translate3d(4%, 8%, 0) scale(1.06); }
    }

    @keyframes ribbonTwo {
      0% { transform: rotate(26deg) translate3d(0, 0, 0) scale(1); }
      100% { transform: rotate(18deg) translate3d(-6%, -8%, 0) scale(1.07); }
    }

    @keyframes ribbonThree {
      0% { transform: rotate(-12deg) translate3d(0, 0, 0) scale(1); }
      100% { transform: rotate(-18deg) translate3d(4%, -6%, 0) scale(1.08); }
    }

    @keyframes pulseOne {
      0%, 100% { transform: scale(1); opacity: 0.36; }
      50% { transform: scale(1.12); opacity: 0.56; }
    }

    @keyframes pulseTwo {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.14); opacity: 0.52; }
    }

    @keyframes fluidMorph {
      0%, 100% {
        border-radius: 60% 40% 55% 45% / 48% 38% 62% 52%;
      }
      50% {
        border-radius: 44% 56% 38% 62% / 54% 66% 34% 46%;
      }
    }

    @keyframes fluidDrift {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      }
      100% {
        transform: translate3d(4vmax, -2vmax, 0) rotate(14deg) scale(1.08);
      }
    }

    @keyframes liquidOrbit {
      0% {
        transform: rotate(0deg) scale(1);
      }
      100% {
        transform: rotate(360deg) scale(1.06);
      }
    }

    @keyframes liquidOrbitReverse {
      0% {
        transform: rotate(0deg) scale(1);
      }
      100% {
        transform: rotate(-360deg) scale(1.08);
      }
    }

    @keyframes liquidRibbonOne {
      0% {
        transform: rotate(-30deg) translate3d(0, 0, 0) scale(1.02);
      }
      100% {
        transform: rotate(-24deg) translate3d(5vmax, 2vmax, 0) scale(1.09);
      }
    }

    @keyframes liquidRibbonTwo {
      0% {
        transform: rotate(30deg) translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: rotate(36deg) translate3d(-4vmax, -2vmax, 0) scale(1.08);
      }
    }

    @keyframes liquidRibbonThree {
      0% {
        transform: rotate(-20deg) translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: rotate(-16deg) translate3d(-5vmax, 3vmax, 0) scale(1.06);
      }
    }

    @keyframes loaderSpin {
      to { transform: rotate(360deg); }
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1160px, calc(100% - 34px));
      margin: 0 auto;
    }

    .glass {
      background: linear-gradient(130deg, rgba(22, 30, 55, 0.74), rgba(8, 12, 24, 0.8));
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s ease, border-color 0.35s ease;
    }

    .glass:not(.topbar):not(.status-card):not(.cta-panel):not(.price-card):hover {
      transform: translateY(-4px);
      box-shadow: 0 28px 65px rgba(0, 0, 0, 0.5), 0 0 24px rgba(143, 105, 255, 0.12);
      border-color: rgba(143, 105, 255, 0.35);
    }

    .top-wrap {
      padding-top: 14px;
      position: sticky;
      top: 0;
      z-index: 60;
      pointer-events: none;
    }

    .topbar {
      pointer-events: auto;
      border-radius: 999px;
      min-height: 64px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-size: 1.06rem;
      flex-shrink: 0;
      font-family: "Outfit", sans-serif;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(80, 211, 255, 0.34), rgba(143, 105, 255, 0.4));
      border: 1px solid rgba(255, 255, 255, 0.16);
      overflow: hidden;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .menu {
      display: none;
      align-items: center;
      gap: 24px;
      color: #c8d0e1;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .menu a {
      transition: color 0.2s ease;
    }

    .menu a:hover {
      color: #ffffff;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      padding: 9px 14px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
      transition: transform 0.18s ease, opacity 0.2s ease;
      font-family: "Outfit", sans-serif;
    }

    .pill:hover {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    .pill-outline {
      color: #dbe4f8;
      background: rgba(9, 13, 26, 0.54);
    }

    .pill-main {
      color: #001b09;
      background: linear-gradient(125deg, #1fd868, #2ff2a5);
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow: 0 10px 24px rgba(31, 216, 104, 0.3);
      font-weight: 800;
    }

    .pill-main.dark {
      color: #ffffff;
      background: linear-gradient(125deg, rgba(80, 211, 255, 0.36), rgba(143, 105, 255, 0.42));
      box-shadow: 0 10px 25px rgba(80, 211, 255, 0.22);
    }

    .hero {
      padding: 52px 0 48px;
      min-height: calc(100svh - 86px);
      display: flex;
      align-items: center;
    }

    .hero-grid {
      display: grid;
      gap: 22px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #8ec8ff;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.17em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .eyebrow::before {
      content: "";
      width: 24px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.65;
    }

    h1,
    h2,
    h3 {
      font-family: "Outfit", sans-serif;
      line-height: 1.02;
      letter-spacing: -0.014em;
    }

    h1 {
      font-size: clamp(2.4rem, 7.2vw, 5.2rem);
      margin-bottom: 10px;
      max-width: 11ch;
      text-wrap: balance;
      background: linear-gradient(135deg, #ffffff 0%, #a8c0ff 40%, #50d3ff 70%, #8f69ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-slogan {
      color: #b5c7ff;
      font-size: clamp(1rem, 2vw, 1.12rem);
      max-width: 42ch;
      margin-bottom: 8px;
      font-weight: 600;
      font-style: italic;
    }

    .hero p {
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(0.98rem, 1.9vw, 1.08rem);
    }

    .hero-actions {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .status-card {
      border-radius: var(--radius-xl);
      padding: 20px 20px 18px;
      max-width: 620px;
      justify-self: end;
      width: 100%;
    }

    .status-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-title {
      color: #ffbf2f;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      font-family: "Outfit", sans-serif;
    }

    .status-value {
      font-size: 0.9rem;
      color: #d8e3ff;
      font-weight: 600;
    }

    .track {
      margin-bottom: 10px;
    }

    .track:last-child {
      margin-bottom: 0;
    }

    .track-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 10px;
      color: #ced6ef;
      font-size: 0.88rem;
    }

    .bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.11);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      width: var(--fill, 50%);
      background: var(--bar-color, linear-gradient(90deg, #ffb11a, #ff6d1f));
    }

    .section {
      padding: 88px 0;
      position: relative;
    }

    .section + .section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(600px, 80%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(143, 105, 255, 0.4), rgba(80, 211, 255, 0.4), transparent);
    }

    .section-head {
      margin-bottom: 32px;
    }

    .section-head h2 {
      font-size: clamp(2.1rem, 5.2vw, 3.6rem);
      margin-bottom: 9px;
      max-width: 20ch;
      color: #f6f9ff;
      text-wrap: balance;
    }

    .section-head p {
      max-width: 700px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .insights-grid {
      display: grid;
      gap: 14px;
      align-items: start;
    }

    .insight-metrics {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 12px;
    }

    .insight-card {
      border-radius: var(--radius-lg);
      padding: 16px;
      display: grid;
      gap: 7px;
      min-height: 100%;
      background: linear-gradient(150deg, rgba(20, 28, 48, 0.84), rgba(10, 14, 28, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .insight-label {
      color: #b8c5e3;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 700;
      font-family: "Outfit", sans-serif;
    }

    .insight-value {
      font-family: "Outfit", sans-serif;
      font-size: clamp(1.8rem, 3.8vw, 2.6rem);
      line-height: 0.95;
      color: #f5f8ff;
    }

    .insight-delta {
      width: fit-content;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.72rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: #d4def3;
    }

    .insight-context {
      color: #9eabca;
      font-size: 0.83rem;
    }

    .ai-loop {
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      display: grid;
      gap: 12px;
      min-height: 100%;
    }

    .ai-loop-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .ai-loop-head strong {
      color: #ffd26f;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.86rem;
      font-family: "Outfit", sans-serif;
    }

    .ai-loop-head span {
      color: #d3def5;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .ai-loop-list {
      display: grid;
      gap: 10px;
    }

    .ai-loop-item {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .ai-loop-trigger {
      color: #dce6fa;
      font-size: 0.83rem;
      font-weight: 600;
    }

    .ai-loop-action {
      color: #9fb3d8;
      font-size: 0.82rem;
    }

    .ai-loop-impact {
      width: fit-content;
      font-size: 0.74rem;
      color: #5ff0c5;
      border: 1px solid rgba(95, 240, 197, 0.25);
      border-radius: 999px;
      padding: 3px 9px;
      background: rgba(95, 240, 197, 0.08);
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 24px;
    }

    .project-card {
      border-radius: var(--radius-xl);
      overflow: hidden;

    .reveal {

      transform: translateX(-40px);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);

    .reveal-left.visible {
      opacity: 1;
      transform: translateX(0);

    .reveal-right {
      opacity: 0;
      transform: translateX(40px);

    .reveal-scale {

      transform: scale(0.92);

    .stagger.visible > * { opacity: 1; transform: translateY(0); }
    .stagger > * {

      transform: translateY(20px);

    .stagger > *:nth-child(1) { transition-delay: 0.0s; }
    .stagger > *:nth-child(2) { transition-delay: 0.08s; }
    .stagger > *:nth-child(3) { transition-delay: 0.16s; }
    .stagger > *:nth-child(4) { transition-delay: 0.24s; }
    .stagger > *:nth-child(5) { transition-delay: 0.32s; }
    .stagger > *:nth-child(6) { transition-delay: 0.40s; }
    .stagger > *:nth-child(7) { transition-delay: 0.48s; }
    .stagger > *:nth-child(8) { transition-delay: 0.56s; }

    @media (prefers-reduced-motion: reduce) {

    }
  </style>

  <script>
    const currentYear = new Date().getFullYear();

    function deepMerge(base, source) {
      if (typeof base !== "object" || base === null) {
        return source;
      }
      const output = Array.isArray(base) ? [...base] : { ...base };
      if (typeof source !== "object" || source === null) {
        return output;
      }
      Object.keys(source).forEach((key) => {
        const sourceValue = source[key];
        const baseValue = output[key];
        if (Array.isArray(sourceValue)) {
          output[key] = [...sourceValue];
          return;
        }
        if (sourceValue && typeof sourceValue === "object") {
          output[key] = deepMerge(baseValue || {}, sourceValue);
          return;
        }
        output[key] = sourceValue;
      });
      return output;
    }

    function safe(value, fallback = "") {
      const str = String(value ?? "").trim();
      return str || fallback;
    }

    function normalizeConfig(rawConfig) {
      const defaults = window.PONLO_DEFAULT_CONFIG || {};
      const merged = deepMerge(defaults, rawConfig || {});

      if (!Array.isArray(merged.brand?.nav)) {
        merged.brand.nav = defaults.brand?.nav || [];
      }
      if (!Array.isArray(merged.radar?.metrics)) {
        merged.radar.metrics = defaults.radar?.metrics || [];
      }
      if (!Array.isArray(merged.insightsMetrics)) {
        merged.insightsMetrics = defaults.insightsMetrics || [];
      }
      if (!merged.aiLoop || typeof merged.aiLoop !== "object") {
        merged.aiLoop = defaults.aiLoop || { title: "", period: "", actions: [] };
      }
      if (!Array.isArray(merged.aiLoop?.actions)) {
        merged.aiLoop.actions = defaults.aiLoop?.actions || [];
      }
      if (!Array.isArray(merged.projects)) {
        merged.projects = defaults.projects || [];
      }
      if (!Array.isArray(merged.pricingPlans)) {
        merged.pricingPlans = defaults.pricingPlans || [];
      }
      if (!Array.isArray(merged.processSteps)) {
        merged.processSteps = defaults.processSteps || [];
      }
      if (!Array.isArray(merged.cta?.chips)) {
        merged.cta.chips = defaults.cta?.chips || [];
      }

      return merged;
    }

    function setLink(anchor, cfg, fallbackLabel = "Abrir") {
      const label = safe(cfg?.label, fallbackLabel);
      const href = safe(cfg?.url, "#");
      anchor.textContent = label;
      anchor.href = href;
      const external = /^https?:\/\//i.test(href);
      if (external) {
        anchor.target = "_blank";
        anchor.rel = "noopener";
      } else {
        anchor.removeAttribute("target");
        anchor.removeAttribute("rel");
      }
    }

    function radarColor(value) {
      const map = {
        orange: "linear-gradient(90deg, #ffb11a, #ff6d1f)",
        pink: "linear-gradient(90deg, #9669ff, #ff5bd6)",
        cyan: "linear-gradient(90deg, #2ed8ff, #44ffcf)",
        green: "linear-gradient(90deg, #1fd868, #2ff2a5)",
      };
      return map[value] || map.orange;
    }

    function renderConfig(config) {
      document.getElementById("brandName").textContent = safe(config.brand?.name, "Ponlonline");
      document.getElementById("brandLogo").src = safe(config.brand?.logoUrl, "favicon.svg");
      document.getElementById("brandLogo").alt = `Logo ${safe(config.brand?.name, "Ponlonline")}`;

      const nav = document.getElementById("mainNav");
      nav.innerHTML = "";
      config.brand.nav.forEach((item) => {
        const link = document.createElement("a");
        link.href = safe(item?.href, "#");
        link.textContent = safe(item?.label, "Link");
        nav.appendChild(link);
      });

      setLink(document.getElementById("headerButton"), config.brand.headerButton, "WhatsApp");

      document.getElementById("heroEyebrow").textContent = safe(config.hero?.eyebrow, "Ponlonline");
      document.getElementById("heroTitle").textContent = safe(config.hero?.title, "Webs premium para negocios locales.");
      document.getElementById("heroSlogan").textContent = safe(config.hero?.slogan, "");
      document.getElementById("heroDescription").textContent = safe(config.hero?.description, "");
      setLink(document.getElementById("heroPrimary"), config.hero?.primaryCta, "Empezar proyecto");
      setLink(document.getElementById("heroSecondary"), config.hero?.secondaryCta, "Ver paquetes");

      document.getElementById("radarTitle").textContent = safe(config.radar?.title, "Radar de demanda");
      document.getElementById("radarPeriod").textContent = safe(config.radar?.period, "Q1 2026");

      const radarMetrics = document.getElementById("radarMetrics");
      radarMetrics.innerHTML = "";
      config.radar.metrics.forEach((metric) => {
        const fill = Math.max(0, Math.min(100, Number(metric?.fill) || 0));
        const track = document.createElement("div");
        track.className = "track";
        track.innerHTML = `
          <div class="track-row">
            <span>${safe(metric?.label, "Métrica")}</span>
            <strong>${safe(metric?.value, `${fill}%`)}</strong>
          </div>
          <div class="bar" style="--fill:${fill}%; --bar-color:${radarColor(safe(metric?.color, "orange"))};"><span></span></div>
        `;
        radarMetrics.appendChild(track);
      });

      document.getElementById("insightsHeading").textContent = safe(config.insightsSection?.heading, "Resultados");
      document.getElementById("insightsDescription").textContent = safe(config.insightsSection?.description, "");

      const insightsMetricsGrid = document.getElementById("insightsMetricsGrid");
      insightsMetricsGrid.innerHTML = "";
      config.insightsMetrics.forEach((item) => {
        const article = document.createElement("article");
        article.className = "insight-card";
        article.innerHTML = `
          <span class="insight-label">${safe(item?.label, "Métrica")}</span>
          <strong class="insight-value">${safe(item?.value, "-")}</strong>
          <span class="insight-delta">${safe(item?.delta, "")}</span>
          <p class="insight-context">${safe(item?.context, "")}</p>
        `;
        insightsMetricsGrid.appendChild(article);
      });

      document.getElementById("aiLoopTitle").textContent = safe(config.aiLoop?.title, "Ciclo IA");
      document.getElementById("aiLoopPeriod").textContent = safe(config.aiLoop?.period, "");

      const aiLoopList = document.getElementById("aiLoopList");
      aiLoopList.innerHTML = "";
      config.aiLoop.actions.forEach((action) => {
        const card = document.createElement("article");
        card.className = "ai-loop-item";
        card.innerHTML = `
          <p class="ai-loop-trigger">${safe(action?.trigger, "")}</p>
          <p class="ai-loop-action">${safe(action?.action, "")}</p>
          <span class="ai-loop-impact">${safe(action?.impact, "")}</span>
        `;
        aiLoopList.appendChild(card);
      });

      document.getElementById("projectsHeading").textContent = safe(config.projectsSection?.heading, "Proyectos");
      document.getElementById("projectsDescription").textContent = safe(config.projectsSection?.description, "");

      const projectsGrid = document.getElementById("projectsGrid");
      projectsGrid.innerHTML = "";
      const fallbackProjectUrl = (() => {
        const match = config.projects.find((project) => /^https?:\/\//i.test(safe(project?.linkUrl, "")));
        return match ? safe(match.linkUrl, "https://example.com") : "https://example.com";
      })();

      config.projects.forEach((project) => {
        const article = document.createElement("article");
        article.className = "project-card glass";
        const videoUrl = safe(project?.videoUrl, "");
        const hasVideo = Boolean(videoUrl);
        const rawProjectUrl = safe(project?.linkUrl, "");
        const projectUrl = /^https?:\/\//i.test(rawProjectUrl) ? rawProjectUrl : fallbackProjectUrl;
        const tagsHtml = Array.isArray(project?.tags)
          ? project.tags.map((tag) => `<span class="tag">${safe(tag)}</span>`).join("")
          : "";

        const mediaHtml = hasVideo
          ? `<video src="${videoUrl}" autoplay muted loop playsinline preload="metadata"></video>`
          : `<img src="${safe(project?.imageUrl, "https://images.unsplash.com/photo-1556155092-490a1ba16284?auto=format&fit=crop&w=1200&q=80")}" alt="Proyecto ${safe(project?.title, "Proyecto")}" loading="lazy" />`;

        article.innerHTML = `
          <div class="project-media">
            ${mediaHtml}
            <div class="project-overlay">
              <a href="${projectUrl}" target="_blank" rel="noopener" class="project-overlay-btn">Ver proyecto ↗</a>
            </div>
          </div>
          <div class="project-body">
            <h3>${safe(project?.title, "Proyecto")}</h3>
            <p>${safe(project?.description, "")}</p>
            <div class="tags">${tagsHtml}</div>
            <div class="project-links"><a href="${projectUrl}" target="_blank" rel="noopener">Ver página</a></div>
          </div>
        `;

        projectsGrid.appendChild(article);
      });

      document.getElementById("pricingHeading").textContent = safe(config.pricingSection?.heading, "Precios");
      document.getElementById("pricingDescription").textContent = safe(config.pricingSection?.description, "");

      const pricingGrid = document.getElementById("pricingGrid");
      pricingGrid.innerHTML = "";
      config.pricingPlans.forEach((plan) => {
        const card = document.createElement("article");
        card.className = `price-card glass${plan?.featured ? " featured" : ""}`;
        const features = Array.isArray(plan?.features)
          ? plan.features.map((feature) => `<li>${safe(feature)}</li>`).join("")
          : "";

        card.innerHTML = `
          <span class="price-badge">${safe(plan?.badge, "Plan")}</span>
          <h3>${safe(plan?.title, "")}</h3>
          <div class="price">${safe(plan?.price, "USD 0")} <small>${safe(plan?.priceSuffix, "")}</small></div>
          <p>${safe(plan?.description, "")}</p>
          <ul class="features">${features}</ul>
        `;
        pricingGrid.appendChild(card);
      });

      document.getElementById("processHeading").textContent = safe(config.processSection?.heading, "Proceso");
      document.getElementById("processDescription").textContent = safe(config.processSection?.description, "");

      const processGrid = document.getElementById("processGrid");
      processGrid.innerHTML = "";
      config.processSteps.forEach((step) => {
        const article = document.createElement("article");
        article.className = "flow-item glass";
        article.innerHTML = `
          <div>
            <h3>${safe(step?.title, "Paso")}</h3>
            <p>${safe(step?.description, "")}</p>
          </div>
        `;
        processGrid.appendChild(article);
      });

      document.getElementById("ctaHeading").textContent = safe(config.cta?.heading, "");
      document.getElementById("ctaDescription").textContent = safe(config.cta?.description, "");
      setLink(document.getElementById("ctaPrimary"), config.cta?.primaryCta, "WhatsApp");
      setLink(document.getElementById("ctaSecondary"), config.cta?.secondaryCta, "Correo");

      const ctaChips = document.getElementById("ctaChips");
      ctaChips.innerHTML = "";
      config.cta.chips.forEach((chip) => {
        const span = document.createElement("span");
        span.textContent = safe(chip);
        ctaChips.appendChild(span);
      });

      // Payment methods
      const pmIcons = {
        "pago-movil": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18.01"/><path d="M9 9l2 2 4-4"/></svg>`,
        "binance": `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L6.5 7.5 8.36 9.36 12 5.72l3.64 3.64L17.5 7.5 12 2zm-7.5 10L2 14.5 4.5 17 7 14.5 4.5 12zm15 0L17 14.5 19.5 17 22 14.5 19.5 12zM12 9.28L8.36 12.92 6.5 11.06 12 5.56l5.5 5.5-1.86 1.86L12 9.28zM12 14.72l3.64-3.64 1.86 1.86L12 18.44l-5.5-5.5 1.86-1.86L12 14.72z"/></svg>`,
        "zelle": `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.559 24h-2.841c-.971 0-1.392-.394-1.392-1.252V18.6H4.876c-.86 0-1.308-.404-1.308-1.252v-2.14c0-.556.168-.893.727-1.384L14.23 4.452H4.876c-.86 0-1.308-.404-1.308-1.252V1.252C3.568.394 3.989 0 4.876 0h13.799c.86 0 1.308.404 1.308 1.252V3.2c0 .556-.168.893-.727 1.384L9.322 13.956h5.153c0-.005 0 .005 0 0h4.2c.86 0 1.308.404 1.308 1.252v2.14c0 .556-.168.893-.727 1.384l-.581.527v3.489c0 .858-.421 1.252-1.392 1.252h-.283V18.6h-3.44v5.4z"/></svg>`
      };
      const pmContainer = document.getElementById("paymentMethods");
      const methods = config.paymentMethods || [];
      if (methods.length > 0) {
        pmContainer.innerHTML = `<span class="pm-label">Aceptamos</span><div class="pm-icons">${methods.map(m =>
          `<span class="pm-item">${pmIcons[m.icon] || ""}${safe(m.name)}</span>`
        ).join("")}</div>`;
      }

      const footerTemplate = safe(config.footerText, "Ponlonline · {{year}}");
      document.getElementById("footerText").textContent = footerTemplate.replaceAll("{{year}}", String(currentYear));
    }

    async function loadConfig() {
      const defaults = window.PONLO_DEFAULT_CONFIG || {};
      let remoteConfig = null;
      let legacyProjects = null;

      try {
        const response = await fetch("/api/get-config", {
          headers: { Accept: "application/json" },
          cache: "no-store",
        });
        if (response.ok) {
          const payload = await response.json();
          if (payload && typeof payload.config === "object") {
            remoteConfig = payload.config;
          }
          if (Array.isArray(payload?.projects)) {
            legacyProjects = payload.projects;
          }
        }
      } catch (_error) {
        // fallback to defaults
      }

      let finalConfig = normalizeConfig(remoteConfig || defaults);
      if (legacyProjects && legacyProjects.length) {
        finalConfig.projects = legacyProjects;
      }

      renderConfig(finalConfig);
    }

    async function boot() {
      const minDelayMs = 1300;
      const startedAt = Date.now();
      const loader = document.getElementById("entryLoader");

      await loadConfig();

      const elapsed = Date.now() - startedAt;
      const remaining = Math.max(0, minDelayMs - elapsed);
      if (remaining > 0) {
        await new Promise((resolve) => setTimeout(resolve, remaining));
      }

      document.body.classList.remove("is-loading");
      if (loader) {
        loader.classList.add("hide");
        window.setTimeout(() => loader.remove(), 520);
      }
    }

    boot();

    const animatedEls = document.querySelectorAll(".reveal, .reveal-left, .reveal-right, .reveal-scale, .stagger");
    const observer = new IntersectionObserver(
      (entries, obs) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          entry.target.classList.add("visible");
          obs.unobserve(entry.target);
        });
      },
      {
        threshold: 0.12,
        rootMargin: "0px 0px -6% 0px"
      }
    );

    animatedEls.forEach((item) => observer.observe(item));

    // Counter animation for insight values
    function animateCounter(el) {
      const text = el.textContent.trim();
      const match = text.match(/^([<>]?\s*)(\d+)(.*)$/);
      if (!match) return; // non-numeric like "Incluido"
      const prefix = match[1];
      const target = parseInt(match[2]);
      const suffix = match[3];
      const duration = 1200;
      const start = performance.now();
      el.textContent = prefix + "0" + suffix;
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        const current = Math.round(target * eased);
        el.textContent = prefix + current + suffix;
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    const counterObserver = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.querySelectorAll(".insight-value").forEach(animateCounter);
        obs.unobserve(entry.target);
      });
    }, { threshold: 0.3 });

    const metricsGrid = document.getElementById("insightsMetricsGrid");
    if (metricsGrid) counterObserver.observe(metricsGrid);
  </script>
</body>
